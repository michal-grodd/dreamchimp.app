{{ define "main" }}
<header>
  <a href="/" style="display: flex; align-items: center; gap: 1rem; color: inherit; text-decoration: none;">
    {{ $icon := resources.Get "app_icon_optimized.png" }}
    {{ if $icon }}
      {{ $resized := $icon.Resize "256x256" }}
      <img src="{{ $resized.RelPermalink }}" alt="{{ .Site.Title }}" />
    {{ end }}
    <h1>{{ .Site.Title }}</h1>
  </a>
</header>

<section class="page-header">
  <h1>{{ .Title }}</h1>
</section>

<article class="page-content">
  {{ .Content }}
</article>

<div style="margin-top: 3rem;">
  <a href="/" style="color: var(--muted); text-decoration: none; font-size: 0.9rem;">&larr; Back to home</a>
</div>
{{ end }}
